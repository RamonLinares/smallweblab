name: Sync prototypes

on:
  workflow_dispatch:
  repository_dispatch:
    types:
      - prototype-updated
  schedule:
    - cron: "17 * * * *"

permissions:
  contents: write

concurrency:
  group: sync-prototypes
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Sync configured prototypes
        run: python3 scripts/sync_prototypes.py

      - name: Commit synced changes
        run: |
          if [[ -z "$(git status --porcelain lab)" ]]; then
            echo "No prototype changes found."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A lab
          git commit -m "Sync prototype content"
          git push origin HEAD:main
